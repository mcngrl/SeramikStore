<!DOCTYPE html>
<html>
<body style="background:#f4f6f8;font-family:Arial;font-size:20px">
    <table width="100%" border="1" cellpadding="0" cellspacing="0">
        <tr>
            <td align="center" style="padding:40px">
                <table border="1" width="600" style="background:#fff;border-radius:12px">

                    <tr>
                        <td style="text-align: center;">
                            <img src="{{logo}}" alt="{{Company}}" style="height:100px;line-height:0;outline:none;
                            text-decoration:none;vertical-align:top;border-width:0" />
                        </td>
                    </tr>

                    <tr>
                        <td align="center" style="padding:12px">
                            <p>{{Intro}}:</p>
                        </td>
                    </tr>
                    <tr>
                        <td align="center" style="padding:12px">
                            <a style="font-size:15px;color:#666">{{Code}}</a>
                          </td>
                    </tr>
                    <tr>
                        <td align="center" style="padding:12px">
                            <a style="font-size:15px;color:#666">{{Info}}</a>
                        </td>
                    </tr>
                    <tr>
                        <td align="center" style="padding:12px">
                            <p >&copy; {{Company}}</p>
                        </td>
                    </tr>

                </table>
            </td>
        </tr>
    </table>
</body>
</html>
